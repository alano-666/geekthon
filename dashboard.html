<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wellora 健康面板 · zhangjiahui</title>
<style>
:root {
  --bg: #f8f6f1;
  --panel: rgba(255,255,255,0.88);
  --panel-solid: #ffffff;
  --line: #ece8df;
  --text: #1f211c;
  --muted: #858a7e;
  --green: #8ba66b;
  --green-dark: #5f7f42;
  --green-soft: #edf3e7;
  --red: #ff746f;
  --purple: #9a91ed;
  --orange: #f2b866;
  --blue: #8aaec4;
  --shadow: 0 18px 45px rgba(93,82,62,0.08);
}
*{box-sizing:border-box}
body{
  margin:0;min-height:100vh;color:var(--text);
  font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,-apple-system,sans-serif;
  background:
    radial-gradient(circle at 18% 12%,rgba(232,223,205,0.52),transparent 28rem),
    radial-gradient(circle at 88% 72%,rgba(220,230,213,0.62),transparent 30rem),
    var(--bg);
}
button{font:inherit}
.app-shell{
  display:grid;grid-template-columns:220px minmax(0,1fr);
  width:min(1800px,calc(100vw - 24px));min-height:calc(100vh - 24px);
  margin:12px auto;overflow:hidden;
  border:1px solid rgba(236,232,223,0.92);border-radius:8px;
  background:rgba(255,255,255,0.54);box-shadow:var(--shadow);
}
.sidebar{
  display:flex;flex-direction:column;gap:22px;padding:26px 18px;
  border-right:1px solid var(--line);background:rgba(255,255,255,0.64);
}
.brand{display:inline-flex;align-items:center;gap:7px;padding:0 10px;color:#1b2017;font-family:Georgia,serif;font-size:18px;font-weight:700;text-decoration:none}
.brand-mark{color:var(--green);font-size:24px;line-height:1}
.nav{display:grid;gap:7px}
.nav-item{
  display:grid;grid-template-columns:22px 1fr;align-items:center;gap:10px;
  min-height:42px;padding:0 14px;border:0;border-radius:8px;
  color:#596052;background:transparent;cursor:pointer;text-align:left;
  transition:background .18s,color .18s,transform .18s;
}
.nav-item span{color:#68765a;font-size:17px}
.nav-item:hover,.nav-item.active{color:var(--green-dark);background:var(--green-soft)}
.nav-item:active{transform:translateY(1px)}
.plant-card{
  margin-top:auto;padding:12px;border-radius:8px;
  background:linear-gradient(140deg,#f4f0e7,#ffffff 68%);color:#777b70;font-size:12px;
}
.plant-scene{
  position:relative;height:98px;overflow:hidden;border-radius:8px;
  background:radial-gradient(circle at 20% 15%,rgba(255,255,255,0.94),transparent 5rem),
    linear-gradient(135deg,#f5f0e5,#e9eddf);
}
.leaf,.vase{position:absolute;display:block}
.leaf{width:28px;height:13px;border-radius:100% 0 100% 0;background:#7f9b65;transform-origin:left bottom}
.l1{left:82px;top:34px;transform:rotate(-35deg)}
.l2{left:104px;top:43px;transform:rotate(18deg);background:#9cad79}
.l3{left:74px;top:57px;transform:rotate(-8deg);background:#6e8a55}
.l4{left:118px;top:63px;transform:rotate(35deg)}
.vase{left:88px;bottom:10px;width:42px;height:34px;border-radius:50% 50% 42% 42%;background:linear-gradient(135deg,#fff,#e8e0d0);box-shadow:0 10px 18px rgba(113,103,80,.12)}
.plant-card p{margin:10px 4px 2px}
.profile{
  display:grid;grid-template-columns:34px 1fr 18px;align-items:center;gap:10px;
  padding:9px;border:0;border-radius:8px;background:transparent;color:var(--text);cursor:pointer;text-align:left;
}
.profile:hover{background:rgba(237,243,231,0.72)}
.avatar{display:grid;place-items:center;width:34px;height:34px;border-radius:50%;color:#fff;background:#3d3127;font-weight:700}
.profile small{display:block;margin-top:2px;color:var(--muted);font-size:11px}
.chevron{color:#8c9187}
.main{min-width:0;padding:26px 28px}
.view{min-height:100%}
.topbar,.subhead{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:28px}
.topbar h1,.page-title h1{margin:0;font-size:clamp(24px,2.2vw,32px);line-height:1.1}
.topbar p,.page-title p{margin:9px 0 0;color:var(--muted);font-size:14px}
.toolbar{display:flex;align-items:center;gap:14px}
.action{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  min-height:38px;padding:0 16px;border:0;border-radius:8px;
  background:var(--green);color:#fff;cursor:pointer;font-weight:700;font-size:13px;
  box-shadow:0 10px 22px rgba(122,149,91,.22);
}
.action.secondary{border:1px solid #cad8bc;background:#f8fbf4;color:var(--green-dark);box-shadow:none}
.metrics-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:24px}
.metric-card,.card,.chart-panel,.meal-panel,.report-card{
  border:1px solid var(--line);border-radius:8px;background:var(--panel);
  box-shadow:0 12px 28px rgba(88,79,60,.04);
}
.metric-card{min-height:158px;padding:22px;cursor:pointer;transition:transform .18s,border-color .18s,box-shadow .18s}
.metric-card:hover{border-color:#dce5d1;box-shadow:0 16px 36px rgba(88,79,60,.08);transform:translateY(-2px)}
.metric-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;color:#31352f;font-weight:700}
.metric-icon{font-size:20px}
.metric-value{display:flex;align-items:baseline;gap:6px;margin-bottom:8px;font-size:28px;font-weight:800;letter-spacing:0}
.metric-value small,.unit{color:#5d6359;font-size:13px;font-weight:500}
.status-pill{
  display:inline-flex;align-items:center;min-height:22px;padding:0 7px;
  border-radius:5px;color:var(--green-dark);background:var(--green-soft);font-size:12px;font-weight:700;
}
.status-pill.warn{color:#c07000;background:#fff4e0}
.status-pill.info{color:#2d6a8a;background:#e3f2f9}
.status-pill.red{color:#b03030;background:#ffeeee}
.progress-track{height:10px;margin:18px 0 8px;overflow:hidden;border-radius:999px;background:#ecebe4}
.progress-track span{display:block;width:var(--value);height:100%;border-radius:inherit;background:var(--bar,var(--green))}
.progress-value{text-align:right;font-weight:700}
.section-title{display:flex;align-items:center;justify-content:space-between;margin:0 0 16px}
.section-title h2{margin:0;font-size:19px}
.home-overview{display:grid;grid-template-columns:1.1fr 1.7fr;gap:16px;margin-bottom:18px}
.card{padding:22px}
.advice-panel{
  position:relative;min-height:160px;padding:24px 220px 24px 24px;overflow:hidden;
  background:radial-gradient(circle at 86% 44%,rgba(237,228,210,.82),transparent 9rem),var(--panel-solid);
  border:1px solid var(--line);border-radius:8px;box-shadow:0 12px 28px rgba(88,79,60,.04);
}
.advice-panel h3{margin:0 0 10px;font-size:15px}
.check-list{display:grid;gap:10px;margin:14px 0 0;padding:0;list-style:none;color:#555c52;font-size:13px}
.check-list li::before{content:"✓";display:inline-grid;place-items:center;width:16px;height:16px;margin-right:8px;border-radius:50%;color:var(--green-dark);background:var(--green-soft);font-size:11px;font-weight:700}
.still-life{position:absolute;right:24px;bottom:14px;width:170px;height:130px}
.still-life::before{content:"";position:absolute;right:15px;bottom:0;width:82px;height:64px;border-radius:50% 50% 42% 42%;background:linear-gradient(135deg,#fff,#e7ddca);box-shadow:0 13px 28px rgba(107,93,67,.13)}
.still-life::after{content:"";position:absolute;right:98px;bottom:12px;width:70px;height:9px;border-radius:999px;background:rgba(155,126,79,.34);transform:rotate(-14deg)}
.twig{position:absolute;right:64px;bottom:58px;width:3px;height:72px;background:#8e9a62;transform:rotate(-28deg)}
.twig::before,.twig::after{content:"";position:absolute;width:24px;height:11px;border-radius:100% 0 100% 0;background:#8ba66b}
.twig::before{left:-20px;top:10px;transform:rotate(-18deg)}
.twig::after{left:5px;top:30px;transform:rotate(32deg)}
.dashboard-grid{display:grid;grid-template-columns:minmax(0,1.55fr) minmax(300px,0.85fr);gap:18px}
.chart-panel,.meal-panel,.report-card{padding:22px}
.chart-svg{width:100%;height:220px;overflow:visible}
.chart-grid line{stroke:#e8e5dd;stroke-width:1}
.axis-text{fill:#858a7e;font-size:11px}
.chart-line{fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.chart-fill{opacity:.12}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
.stat-box{min-height:68px;padding:14px;border:1px solid var(--line);border-radius:8px;background:#fff}
.stat-box small{display:block;margin-bottom:6px;color:var(--muted);font-size:12px}
.stat-box strong{font-size:20px}
.bar-chart-h{display:grid;grid-template-columns:repeat(5,1fr);align-items:end;height:130px;gap:10px;padding:0 4px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:5px;height:100%}
.bar-col-inner{width:100%;display:flex;align-items:flex-end;flex:1}
.bar-v{width:100%;border-radius:4px 4px 0 0;min-height:4px}
.bar-col-label{font-size:10px;color:var(--muted);white-space:nowrap}
.bar-col-val{font-size:10px;font-weight:700;color:var(--text)}
.app-bar-list{display:grid;gap:9px}
.app-bar-row{display:grid;grid-template-columns:130px 1fr 52px;align-items:center;gap:12px;font-size:13px}
.app-bar-track{height:8px;background:#ecebe4;border-radius:4px;overflow:hidden}
.app-bar-fill{height:100%;border-radius:4px}
.app-bar-val{color:var(--muted);font-size:12px;text-align:right}
.workout-list{display:grid;gap:10px}
.workout-item{
  display:grid;grid-template-columns:42px 1fr auto;align-items:center;gap:14px;
  padding:14px 16px;border:1px solid var(--line);border-radius:8px;background:var(--panel);
}
.workout-emoji{font-size:20px;display:grid;place-items:center}
.workout-name{font-size:14px;font-weight:600}
.workout-meta{font-size:12px;color:var(--muted);margin-top:2px}
.workout-right{text-align:right}
.workout-dur{font-size:14px;font-weight:700;color:var(--green-dark)}
.workout-kcal{font-size:12px;color:var(--muted);margin-top:2px}
.info-banner{
  display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:flex-start;
  padding:16px 18px;border:1px solid #f0e4c4;border-radius:8px;background:#fffbf0;margin-bottom:18px;font-size:13px;color:#6b5100;
}
.info-banner.ok{border-color:#d1e7c0;background:#f4faf0;color:#3a5f1a}
.data-note{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6}
.two-col-eq{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.source-card{padding:18px;border:1px solid var(--line);border-radius:8px;background:var(--panel)}
.source-card h4{margin:0 0 10px;font-size:14px;display:flex;align-items:center;gap:7px}
.source-card p{margin:0;font-size:12px;color:var(--muted);line-height:1.7}
.dot-live{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.category-pill{display:inline-flex;align-items:center;height:22px;padding:0 8px;border-radius:5px;font-size:11px;font-weight:700;background:var(--green-soft);color:var(--green-dark);margin-right:4px}
.donut-wrap{display:grid;grid-template-columns:140px 1fr;align-items:center;gap:18px}
.summary-table{width:100%;border-collapse:collapse;font-size:13px}
.summary-table th{text-align:left;padding:0 0 10px;color:var(--muted);font-weight:600;font-size:12px;border-bottom:1px solid var(--line)}
.summary-table td{padding:10px 0;border-bottom:1px solid var(--line);vertical-align:middle}
.summary-table tr:last-child td{border-bottom:0}
.summary-table .val{font-weight:700;font-size:15px}
.summary-table .partial{color:var(--orange);font-size:11px;margin-left:4px}
.score-big{font-size:52px;font-weight:800;line-height:1;color:var(--green-dark)}
.score-big small{font-size:18px;color:var(--muted)}
.ai-grid{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(280px,0.75fr);gap:18px}
.recommendation-list{display:grid;gap:12px;margin-top:14px}
.rec-item{display:grid;grid-template-columns:28px 1fr;gap:10px;align-items:flex-start;font-size:13px;color:#555c52}
.rec-icon{font-size:16px;margin-top:2px}
.toast{position:fixed;left:50%;bottom:28px;z-index:20;max-width:420px;padding:12px 18px;border:1px solid #dce5d1;border-radius:8px;background:rgba(255,255,255,.95);color:#3d4933;box-shadow:var(--shadow);opacity:0;pointer-events:none;transform:translate(-50%,14px);transition:opacity .2s,transform .2s}
.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:1180px){.metrics-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.home-overview,.dashboard-grid,.ai-grid,.two-col-eq,.three-col{grid-template-columns:1fr}}
@media(max-width:820px){.app-shell{grid-template-columns:1fr;width:100%;min-height:100vh;margin:0;border-radius:0}.sidebar{position:sticky;top:0;z-index:10;display:block;padding:14px;border-right:0;border-bottom:1px solid var(--line)}.brand,.plant-card,.profile{display:none}.nav{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}.nav-item{grid-template-columns:18px max-content;min-height:38px;white-space:nowrap}.main{padding:20px 14px}}
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <a class="brand" href="#"><span class="brand-mark">⌁</span><span>Wellora</span></a>
    <nav class="nav" aria-label="主导航">
      <button class="nav-item active" data-view="home"><span>⌂</span>首页</button>
      <button class="nav-item" data-view="steps"><span>⌘</span>步数统计</button>
      <button class="nav-item" data-view="heart"><span>♡</span>心率 &amp; HRV</button>
      <button class="nav-item" data-view="sleep"><span>◔</span>睡眠记录</button>
      <button class="nav-item" data-view="screen"><span>□</span>屏幕使用</button>
      <button class="nav-item" data-view="workouts"><span>✣</span>运动记录</button>
      <button class="nav-item" data-view="ai"><span>★</span>AI 健康分析</button>
      <button class="nav-item" data-view="sources"><span>⚙</span>数据源状态</button>
    </nav>
    <div class="plant-card" aria-hidden="true">
      <div class="plant-scene">
        <span class="leaf l1"></span><span class="leaf l2"></span>
        <span class="leaf l3"></span><span class="leaf l4"></span>
        <span class="vase"></span>
      </div>
      <p>保持热爱，奔赴山海</p>
    </div>
    <button class="profile" type="button">
      <span class="avatar">Z</span>
      <span><strong>zhangjiahui</strong><small>数据接入中</small></span>
      <span class="chevron">⌄</span>
    </button>
  </aside>
  <main class="main">
    <section id="app" class="view" aria-live="polite"></section>
  </main>
</div>
<div id="toast" class="toast" role="status"></div>

<script>
/* ===========================================================================
   动态数据看板 —— 从本地 JSON 实时读取
   数据源（相对本页面）：
     data/processed/autosync-summary.json   （Apple Health 摘要）
     data/processed/screen-time-latest.json  （今日屏幕使用）
   注意：必须通过本地服务器打开（http://localhost:...），
         直接双击 file:// 会被浏览器拦截 fetch。
   =========================================================================== */

const app = document.querySelector('#app');
const toast = document.querySelector('#toast');
let DATA = null;
let currentView = 'home';

/* ---------- 格式化 / 时区（统一北京时间 Asia/Shanghai） ---------- */
const fmtT = iso => { if(!iso) return '—'; try { return new Date(iso).toLocaleTimeString('zh-CN',{timeZone:'Asia/Shanghai',hour:'2-digit',minute:'2-digit',hour12:false}); } catch(e){ return '—'; } };
const fmtMD = iso => { if(!iso) return '—'; try { return new Date(iso).toLocaleDateString('en-CA',{timeZone:'Asia/Shanghai'}).slice(5); } catch(e){ return '—'; } };
const keyMD = k => k.slice(4,6)+'-'+k.slice(6,8);
const fullDate = k => `${+k.slice(0,4)}年${+k.slice(4,6)}月${+k.slice(6,8)}日`;
const weekdayCN = k => '周'+'日一二三四五六'[new Date(+k.slice(0,4),+k.slice(4,6)-1,+k.slice(6,8)).getDay()];
const kj2kcal = kj => Math.round((kj||0)/4.184);
const fmtDur = min => min>=60 ? `${Math.floor(min/60)}h ${min%60}m` : `${min}m`;
const durText = (a,b) => { if(!a||!b) return '—'; const ms=new Date(b)-new Date(a); if(ms<=0) return '—'; const h=Math.floor(ms/3600000), m=Math.round(ms%3600000/60000); return `${h} 小时 ${m} 分`; };
const pill = (t,c='') => `<span class="status-pill ${c}">${t}</span>`;
const greeting = iso => { let h=12; try{ h=+new Date(iso).toLocaleString('en-US',{timeZone:'Asia/Shanghai',hour:'2-digit',hour12:false}); }catch(e){} return h<6?'凌晨好':h<11?'早上好':h<14?'中午好':h<18?'下午好':'晚上好'; };

/* ---------- 应用 / 分类映射 ---------- */
const APP_META = {
  'com.google.Chrome':              {emoji:'🌐', color:'#8aaec4', cat:'浏览器'},
  'com.apple.Safari':               {emoji:'🧭', color:'#8aaec4', cat:'浏览器'},
  'com.openai.codex':               {emoji:'🤖', color:'#9a91ed', cat:'AI 工具'},
  'com.anthropic.claudefordesktop': {emoji:'🧠', color:'#f2b866', cat:'AI 工具'},
  'com.openai.chat':                {emoji:'💡', color:'#9a91ed', cat:'AI 工具'},
  'com.openai.atlas':               {emoji:'🛰️', color:'#9a91ed', cat:'AI 工具'},
  'com.tencent.xinWeChat':          {emoji:'💬', color:'#8ba66b', cat:'社交'},
  'com.apple.Terminal':             {emoji:'⬛', color:'#858a7e', cat:'开发'},
  'com.github.Electron':            {emoji:'⚛️', color:'#858a7e', cat:'开发'},
  'com.figma.Desktop':              {emoji:'🎨', color:'#ff746f', cat:'设计'},
  'com.liguangming.Shadowrocket':   {emoji:'🚀', color:'#ff746f', cat:'工具'},
  'com.west2online.ClashX':         {emoji:'🔀', color:'#ff746f', cat:'工具'},
  'com.ifunography.HealthExport':   {emoji:'🏥', color:'#8ba66b', cat:'健康'},
  'com.alibaba.quark.clouddrive':   {emoji:'☁️', color:'#8aaec4', cat:'工具'},
  'com.apple.systempreferences':    {emoji:'⚙️', color:'#b9b6ad', cat:'系统'},
  'com.apple.UserNotificationCenter':{emoji:'🔔', color:'#b9b6ad', cat:'系统'},
  'com.apple.SecurityAgent':        {emoji:'🔐', color:'#b9b6ad', cat:'系统'},
  'com.apple.finder':               {emoji:'📁', color:'#b9b6ad', cat:'系统'},
  'com.apple.AppStore':             {emoji:'🛍️', color:'#b9b6ad', cat:'系统'},
  'com.apple.Preview':              {emoji:'👁️', color:'#858a7e', cat:'工具'},
  'com.apple.wifi.diagnostics':     {emoji:'📶', color:'#b9b6ad', cat:'系统'},
};
const CAT_COLOR = {'AI 工具':'#9a91ed','浏览器':'#8aaec4','社交':'#8ba66b','工具':'#ff746f','开发':'#858a7e','设计':'#ff746f','健康':'#8ba66b','系统':'#b9b6ad','其他':'#f2b866'};
const appMeta = bid => APP_META[bid] || {emoji:'📱', color:'#b9b6ad', cat:'其他'};
function workoutMeta(name){
  const n=(name||'').toLowerCase();
  if(n.includes('tennis'))   return {emoji:'🎾', color:'#f2b866', cn:'网球'};
  if(n.includes('cycling'))  return {emoji:'🚴', color:'#8aaec4', cn:'骑行'};
  if(n.includes('strength')) return {emoji:'💪', color:'#8ba66b', cn:'力量训练'};
  if(n.includes('running')||n==='run') return {emoji:'🏃', color:'#ff746f', cn:'跑步'};
  if(n.includes('walk'))     return {emoji:'🚶', color:'#8ba66b', cn:'步行'};
  if(n.includes('swim'))     return {emoji:'🏊', color:'#8aaec4', cn:'游泳'};
  if(n.includes('yoga'))     return {emoji:'🧘', color:'#9a91ed', cn:'瑜伽'};
  if(n.includes('hiit')||n.includes('hiking')) return {emoji:'⛰️', color:'#8ba66b', cn:'徒步'};
  return {emoji:'🏋️', color:'#9a91ed', cn:name};
}

/* ---------- 原始 JSON → 看板数据结构 ---------- */
function transform(h, s){
  const M = h.metrics || {};
  const datesOf = m => (M[m]||{}).dates || {};
  const entry = (m,k) => datesOf(m)[k] || {};
  const field = (m,k,f) => { const e=datesOf(m)[k]; return e && e[f]!=null ? e[f] : null; };

  const stepDates = datesOf('step_count');
  const keys = Object.keys(stepDates).sort();
  const todayKey = keys[keys.length-1];
  const last5 = keys.slice(-5);

  /* 近5日步数 / 距离 / 运动时长 */
  const steps5d = last5.map(k => ({
    date: keyMD(k),
    label: k===todayKey ? '今天' : weekdayCN(k),
    steps: Math.round(stepDates[k].sumQty||0),
    dist: +(field('walking_running_distance',k,'sumQty')||0).toFixed(2),
    exMin: Math.round(field('apple_exercise_time',k,'sumQty')||0),
    partial: k===todayKey,
  }));

  const stepVals = steps5d.map(d=>d.steps);
  const maxI = stepVals.indexOf(Math.max(...stepVals));
  const stepStats = {
    max: stepVals[maxI], maxDate: steps5d[maxI].date,
    avg: Math.round(stepVals.reduce((a,b)=>a+b,0)/(stepVals.length||1)),
    totalDist: +(steps5d.reduce((a,d)=>a+d.dist,0)).toFixed(1),
    maxDist: Math.max(...steps5d.map(d=>d.dist), 0.1),
  };

  /* 今日指标 */
  const rhr = field('resting_heart_rate',todayKey,'avgQty');
  const hrvE = entry('heart_rate_variability',todayKey);
  const spo2 = field('blood_oxygen_saturation',todayKey,'avgQty');
  const hrE = entry('heart_rate',todayKey);
  const aeE = entry('active_energy',todayKey);
  const today = {
    steps: Math.round(stepDates[todayKey].sumQty||0),
    stepsTarget: 10000,
    distance: +(field('walking_running_distance',todayKey,'sumQty')||0).toFixed(2),
    hrResting: rhr!=null ? Math.round(rhr) : null,
    hrSamples: hrE.samples||0,
    hrStart: hrE.start, hrEnd: hrE.end, rhrEnd: entry('resting_heart_rate',todayKey).end,
    hrv: {
      avg: hrvE.avgQty!=null ? +hrvE.avgQty.toFixed(1) : null,
      min: hrvE.minQty!=null ? +hrvE.minQty.toFixed(1) : null,
      max: hrvE.maxQty!=null ? +hrvE.maxQty.toFixed(1) : null,
      n: hrvE.samples||0, start: hrvE.start, end: hrvE.end,
    },
    spo2: spo2!=null ? Math.round(spo2) : null,
    spo2N: entry('blood_oxygen_saturation',todayKey).samples||0,
    spo2Start: entry('blood_oxygen_saturation',todayKey).start, spo2End: entry('blood_oxygen_saturation',todayKey).end,
    activeEnergyKJ: +(field('active_energy',todayKey,'sumQty')||0).toFixed(1),
    aeStart: aeE.start, aeEnd: aeE.end,
    screenMinutes: Math.round(s.totalMinutes||0),
  };

  /* 运动记录 */
  const wk = h.workouts || {items:[]};
  const items = (wk.items||[]).slice().sort((a,b)=> new Date(b.start)-new Date(a.start));
  const workouts = items.map(w => {
    const m = workoutMeta(w.name);
    return { name:w.name, cn:m.cn, emoji:m.emoji, color:m.color, start:w.start,
      date: fmtMD(w.start), dMin: Math.round((w.durationSeconds||0)/60),
      kJ: Math.round(w.activeEnergy||0),
      km: w.totalDistance!=null ? +w.totalDistance.toFixed(2) : null };
  });
  const workoutTotals = {
    count: wk.count||items.length,
    kJ: Math.round(wk.totalActiveEnergy||0),
    distKm: +(wk.totalDistance||0).toFixed(2),
    durSec: wk.totalDurationSeconds||0,
  };
  const typeMap={};
  workouts.forEach(w=>{ (typeMap[w.cn]=typeMap[w.cn]||{cn:w.cn,emoji:w.emoji,color:w.color,count:0}).count++; });
  const workoutTypes = Object.values(typeMap).sort((a,b)=>b.count-a.count)
    .map(t=>({...t, pct: Math.round(t.count/(workouts.length||1)*100)}));
  const workoutTop = items.slice().sort((a,b)=>(b.activeEnergy||0)-(a.activeEnergy||0))[0] || null;
  const sortedByStart = items.slice().sort((a,b)=>new Date(a.start)-new Date(b.start));
  const workoutRange = items.length ? [fmtMD(sortedByStart[0].start), fmtMD(sortedByStart[sortedByStart.length-1].start)] : ['—','—'];

  /* 屏幕使用 */
  const apps = (s.apps||[]).map(a=>{
    const m = appMeta(a.bundleId);
    return { name:a.appName, bundleId:a.bundleId, emoji:m.emoji, color:m.color, cat:m.cat, min:+(a.durationMinutes||0).toFixed(1) };
  }).filter(a=>a.min>0).sort((a,b)=>b.min-a.min);
  const catMap={};
  apps.forEach(a=>{ catMap[a.cat]=(catMap[a.cat]||0)+a.min; });
  const cats = Object.entries(catMap).map(([name,min])=>({name, min:+min.toFixed(1), color:CAT_COLOR[name]||'#b9b6ad'})).sort((a,b)=>b.min-a.min);
  const screenStats = {
    aiMin: Math.round(catMap['AI 工具']||0),
    browserMin: Math.round(catMap['浏览器']||0),
    topApp: apps[0]||null,
    appCount: apps.length,
  };

  /* 睡眠 —— 找最近一条有样本的记录 */
  const sleepDates = datesOf('sleep_analysis');
  const sKeys = Object.keys(sleepDates).sort();
  const lastSleepKey = [...sKeys].reverse().find(k=>(sleepDates[k].samples||0)>0);
  const sleep = {
    todayHasData: (sleepDates[todayKey]||{}).samples>0,
    last: lastSleepKey ? {
      date: keyMD(lastSleepKey),
      start: fmtT(sleepDates[lastSleepKey].start),
      end: fmtT(sleepDates[lastSleepKey].end),
      dur: durText(sleepDates[lastSleepKey].start, sleepDates[lastSleepKey].end),
      samples: sleepDates[lastSleepKey].samples,
    } : null,
  };

  /* Watch 同步是否受限：近5日睡眠缺失 >=2 天 */
  const watchWarn = last5.filter(k=>!((sleepDates[k]||{}).samples>0)).length >= 2;

  /* 今日建议（基于真实数据动态生成） */
  const advice = [];
  const rate = Math.round(today.steps/today.stepsTarget*100);
  advice.push(`步数 ${today.steps.toLocaleString()}，已达每日目标的 ${rate}%${rate>=100?'，已达标 🎉':rate>=60?'，继续保持':'，建议增加活动'}`);
  if(today.hrResting) advice.push(`静息心率 ${today.hrResting} bpm，${today.hrResting>=55&&today.hrResting<=80?'处于健康区间':'建议留意'}`);
  if(today.hrv.avg) advice.push(`HRV ${today.hrv.avg} ms，反映当前恢复状态`);
  if(screenStats.aiMin) advice.push(`AI 工具今日使用 ${screenStats.aiMin} 分钟，注意定时休息眼睛`);
  if(watchWarn) advice.push(`Apple Watch 睡眠/心率数据同步受限，建议检查 Health Auto Export 权限`);
  if(workoutTop) advice.push(`最近高强度运动：${workoutMeta(workoutTop.name).cn}，消耗 ${kj2kcal(workoutTop.activeEnergy)} kcal`);

  /* AI 综合评分 */
  const stepScore = Math.min(100, Math.round(today.steps/today.stepsTarget*100));
  const aiDims = [
    {label:'运动活跃度', score: Math.min(100, workoutTotals.count*12+10), bar:'#8ba66b', note:`近期 ${workoutTotals.count} 次运动`},
    {label:'心血管健康', score: today.hrResting?(today.hrResting<=75?82:70):45, bar:'#ff746f', note: today.hrResting?`静息 ${today.hrResting}bpm · HRV ${today.hrv.avg||'—'}ms`:'数据不足'},
    {label:'步行目标',   score: stepScore, bar:'#f2b866', note:`今日 ${today.steps.toLocaleString()} 步`},
    {label:'屏幕管理',   score: Math.max(30, 100-Math.round(today.screenMinutes/7)), bar:'#9a91ed', note:`${today.screenMinutes} 分钟 · AI ${screenStats.aiMin} 分`},
    {label:'睡眠数据',   score: sleep.todayHasData?80:40, bar:'#858a7e', note: sleep.todayHasData?'今日有记录':'数据中断，无法评估'},
  ];
  const aiOverall = Math.round(aiDims.reduce((a,d)=>a+d.score,0)/aiDims.length);

  return {
    todayKey, date: fullDate(todayKey),
    healthAt: fmtT(h.generatedAt), screenAt: fmtT(s.generatedAt), greet: greeting(h.generatedAt),
    today, steps5d, stepStats,
    workouts, workoutTotals, workoutTypes, workoutTop, workoutRange,
    apps, cats, screenStats, sleep, watchWarn, advice, aiDims, aiOverall,
  };
}

/* ---------- 小图表 ---------- */
function stepBars(days, maxH){
  const max = Math.max(...days.map(d=>d.steps), 1);
  return days.map(d=>{
    const hgt = Math.round(d.steps/max*maxH);
    const dash = d.partial ? 'border:2px dashed #8ba66b;border-bottom:0;opacity:.7' : '';
    return `<div class="bar-col"><div class="bar-col-val">${(d.steps/1000).toFixed(1)}k</div><div class="bar-col-inner"><div class="bar-v" style="height:${hgt}px;background:${d.partial?'#b5cfa0':'#8ba66b'};${dash}"></div></div><div class="bar-col-label">${d.label}</div></div>`;
  }).join('');
}
function distBars(days, max, maxH){
  return days.map(d=>{
    const hgt = Math.round(d.dist/max*maxH);
    return `<div class="bar-col"><div class="bar-col-val">${d.dist}</div><div class="bar-col-inner"><div class="bar-v" style="height:${hgt}px;background:${d.partial?'#a8c8d8':'#8aaec4'};${d.partial?'opacity:.7':''}"></div></div><div class="bar-col-label">${d.label}</div></div>`;
  }).join('');
}
function appBars(apps, maxMin){
  return apps.map(a=>{
    const pct = Math.round(a.min/maxMin*100);
    return `<div class="app-bar-row"><div>${a.emoji} ${a.name}</div><div class="app-bar-track"><div class="app-bar-fill" style="width:${pct}%;background:${a.color}"></div></div><div class="app-bar-val">${a.min.toFixed(0)} 分</div></div>`;
  }).join('');
}
function donutSVG(pct, color, size){
  const r=44,c=60,circ=2*Math.PI*r,dash=circ*(pct/100),gap=circ-dash;
  return `<svg width="${size}" height="${size}" viewBox="0 0 120 120"><circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="#ecebe4" stroke-width="13"/><circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${color}" stroke-width="13" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${circ*0.25}" stroke-linecap="round"/><text x="${c}" y="${c}" text-anchor="middle" dy="0.36em" font-size="24" font-weight="800" fill="#5f7f42">${pct}</text></svg>`;
}
const metricVal = (v,unit,nullText='暂无') => v==null ? `<div class="metric-value" style="font-size:18px;color:var(--muted)">${nullText}</div>` : `<div class="metric-value">${v}<small>${unit}</small></div>`;

function renderScreen(){

    <div class="metric-card"><div class="metric-head"><span>AI 工具</span><span class="metric-icon">🤖</span></div>${metricVal(ss.aiMin,'分钟')} ${pill(Math.round(ss.aiMin/total*100)+'%','info')}<div class="data-note">Codex / Claude / ChatGPT 等</div></div>

    <div class="metric-card"><div class="metric-head"><span>最多单个 App</span><span class="metric-icon">🏅</span></div>${metricVal(ss.topApp?Math.round(ss.topApp.min):0,'分钟')} ${pill(ss.topApp?ss.topApp.name:'—')}<div class="data-note">${ss.topApp?ss.topApp.emoji+' '+ss.topApp.name+' · '+ss.topApp.min+' 分钟':''}</div></div>

/* ---------- 加载 / 错误 / 路由 ---------- */
function loadingView(){
  return `<div class="placeholder" style="min-height:60vh;display:grid;place-items:center;text-align:center"><div><div style="font-size:40px;margin-bottom:16px">⌁</div><div style="font-size:16px;font-weight:700;color:var(--green-dark)">正在读取本地数据…</div><div style="font-size:13px;color:var(--muted);margin-top:8px">data/processed/*.json</div></div></div>`;
}
function errorView(){
  return `<div class="placeholder" style="min-height:60vh;display:grid;place-items:center;text-align:center">
    <div style="max-width:560px">
      <div style="font-size:40px;margin-bottom:16px">🔌</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:10px">无法读取本地数据</div>
      <p style="font-size:13px;color:#6b6e66;line-height:1.8;margin:0 0 16px">浏览器禁止网页直接读取 <code>file://</code> 文件。请通过<strong>本地服务器</strong>打开本页面。</p>
      <div style="text-align:left;background:#1f211c;color:#d8e6c8;border-radius:8px;padding:14px 16px;font-family:ui-monospace,Menlo,monospace;font-size:12px;line-height:1.9">
        <div style="color:#858a7e"># 在终端运行：</div>
        <div>cd /Users/zhangjiahui/Documents/黑客松</div>
        <div>python3 -m http.server 8899</div>
        <div style="color:#858a7e;margin-top:8px"># 然后浏览器打开：</div>
        <div>http://localhost:8899/dashboard.html</div>
      </div>
      <button class="action" style="margin-top:18px" onclick="boot()">↻ 重试</button>
    </div>
  </div>`;
}
const views = { home:renderHome, steps:renderSteps, heart:renderHeart, sleep:renderSleep, screen:renderScreen, workouts:renderWorkouts, ai:renderAI, sources:renderSources };

function nav(id){
  currentView=id;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active', b.dataset.view===id));
  if(!DATA){ app.innerHTML=loadingView(); return; }
  app.innerHTML=(views[id]||renderHome)();
  app.scrollTop=0;
}
function showToast(msg){ toast.textContent=msg; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),2600); }

async function boot(){
  app.innerHTML=loadingView();
  try{
    const opt={cache:'no-store'};
    const [h,s] = await Promise.all([
      fetch('data/processed/autosync-summary.json',opt).then(r=>{ if(!r.ok) throw new Error('health '+r.status); return r.json(); }),
      fetch('data/processed/screen-time-latest.json',opt).then(r=>{ if(!r.ok) throw new Error('screen '+r.status); return r.json(); }),
    ]);
    DATA=transform(h,s);
    nav(currentView);
    showToast('已加载最新本地数据（'+DATA.healthAt+' / '+DATA.screenAt+'）');
  }catch(e){
    console.error('加载失败：',e);
    app.innerHTML=errorView();
  }
}

document.querySelectorAll('.nav-item').forEach(b=>b.addEventListener('click',()=>nav(b.dataset.view)));
boot();
</script>
