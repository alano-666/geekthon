<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 168" width="150" height="168">
  <!-- Hello Kitty · good (one goal met) — playful wink -->
  <!-- body -->
  <path d="M50 108 Q75 100 100 108 L104 168 L46 168 Z" fill="#ffb6cf" stroke="#2b2b2b" stroke-width="3.2" stroke-linejoin="round"/>
  <path d="M60 110 L57 134" fill="none" stroke="#2b2b2b" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M90 110 L93 134" fill="none" stroke="#2b2b2b" stroke-width="2.4" stroke-linecap="round"/>
  <circle cx="61" cy="132" r="3.4" fill="#fff" stroke="#2b2b2b" stroke-width="1.6"/>
  <circle cx="89" cy="132" r="3.4" fill="#fff" stroke="#2b2b2b" stroke-width="1.6"/>
  <ellipse cx="46" cy="116" rx="10" ry="8" fill="#fff" stroke="#2b2b2b" stroke-width="3"/>
  <ellipse cx="104" cy="116" rx="10" ry="8" fill="#fff" stroke="#2b2b2b" stroke-width="3"/>
  <!-- ears -->
  <path d="M40 56 L33 24 L64 46 Z" fill="#fff" stroke="#2b2b2b" stroke-width="3.4" stroke-linejoin="round"/>
  <path d="M110 56 L117 24 L86 46 Z" fill="#fff" stroke="#2b2b2b" stroke-width="3.4" stroke-linejoin="round"/>
  <!-- head -->
  <ellipse cx="75" cy="66" rx="46" ry="37" fill="#fff" stroke="#2b2b2b" stroke-width="3.6"/>
  <!-- bow -->
  <g transform="translate(103,29)" stroke="#2b2b2b" stroke-width="2.6" stroke-linejoin="round">
    <path d="M0 0 L-17 -11 Q-21 0 -17 11 Z" fill="#ff9bbb"/>
    <path d="M0 0 L17 -11 Q21 0 17 11 Z" fill="#ff9bbb"/>
    <circle r="5.2" fill="#ff7da6"/>
  </g>
  <!-- whiskers -->
  <g stroke="#2b2b2b" stroke-width="2.4" stroke-linecap="round">
    <line x1="33" y1="62" x2="8" y2="60"/>
    <line x1="31" y1="72" x2="5" y2="72"/>
    <line x1="33" y1="82" x2="8" y2="84"/>
    <line x1="117" y1="62" x2="142" y2="60"/>
    <line x1="119" y1="72" x2="145" y2="72"/>
    <line x1="117" y1="82" x2="142" y2="84"/>
  </g>
  <!-- nose -->
  <ellipse cx="75" cy="80" rx="6" ry="4" fill="#ffcf4a" stroke="#e0a93b" stroke-width="1"/>
  <!-- left eye (dot) + right eye (wink) -->
  <ellipse cx="59" cy="73" rx="5.6" ry="7.6" fill="#2b2b2b"/>
  <circle cx="60.6" cy="70" r="1.7" fill="#fff"/>
  <path d="M84 75 q7 -8 14 0" fill="none" stroke="#2b2b2b" stroke-width="3.4" stroke-linecap="round"/>
  <ellipse cx="50" cy="85" rx="5.5" ry="3.2" fill="#ffc8d8"/>
  <ellipse cx="100" cy="85" rx="5.5" ry="3.2" fill="#ffc8d8"/>
</svg>
