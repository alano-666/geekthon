<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- state: slacking — no goals met, down -->
  <!-- ears (slightly droopy) -->
  <path d="M30 44 L36 16 L57 38 Z" fill="#fff" stroke="#3a3a3a" stroke-width="2"/>
  <path d="M90 44 L84 16 L63 38 Z" fill="#fff" stroke="#3a3a3a" stroke-width="2"/>
  <path d="M37 37 L39 25 L48 36 Z" fill="#ffc0cb"/>
  <path d="M83 37 L81 25 L72 36 Z" fill="#ffc0cb"/>
  <!-- bow -->
  <g transform="translate(83,32)">
    <path d="M0 0 L-11 -7 L-11 7 Z" fill="#ff5a7a"/>
    <path d="M0 0 L11 -7 L11 7 Z" fill="#ff5a7a"/>
    <circle r="3.2" fill="#ff3e63"/>
  </g>
  <!-- face -->
  <ellipse cx="60" cy="66" rx="35" ry="31" fill="#fff" stroke="#3a3a3a" stroke-width="2"/>
  <!-- droopy sad eyes -->
  <path d="M44 60 q6 6 13 2" fill="none" stroke="#3a3a3a" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M63 62 q7 -4 13 -2" fill="none" stroke="#3a3a3a" stroke-width="3.2" stroke-linecap="round"/>
  <!-- sweat drop -->
  <path d="M86 52 q4 6 0 9 q-4 -3 0 -9z" fill="#7ec8ff" stroke="#5aa6e0" stroke-width="1"/>
  <!-- nose -->
  <path d="M57 72 h6 l-3 3.5 z" fill="#ffb347"/>
  <!-- frown -->
  <path d="M52 82 q8 -7 16 0" fill="none" stroke="#3a3a3a" stroke-width="3" stroke-linecap="round"/>
  <!-- whiskers -->
  <g stroke="#b6b6b6" stroke-width="1.6" stroke-linecap="round">
    <line x1="20" y1="70" x2="39" y2="71"/><line x1="20" y1="78" x2="39" y2="77"/>
    <line x1="100" y1="70" x2="81" y2="71"/><line x1="100" y1="78" x2="81" y2="77"/>
  </g>
</svg>
