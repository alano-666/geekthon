    <path d="M101 22 l1.7 4.2 4.2 1.7 -4.2 1.7 -1.7 4.2 -1.7-4.2 -4.2-1.7 4.2-1.7z"/>
    <path d="M104 70 l1.4 3.5 3.5 1.4 -3.5 1.4 -1.4 3.5 -1.4-3.5 -3.5-1.4 3.5-1.4z"/>
